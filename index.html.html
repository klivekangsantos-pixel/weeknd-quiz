,call_out_my_name:1}},{text:"El pasado me hizo quien soy — lo bueno y lo malo",points:{the_hills:2,starboy:2}},{text:"Pienso en él más de lo que me gustaría admitir",points:{call_out_my_name:3,save_your_tears:1}}]},{question:"Elige una vibra para tu vida ahora mismo:",answers:[{text:"Luces de neón, velocidad y posibilidades infinitas",points:{blinding_lights:3,starboy:1}},{text:"Sanando, creciendo y encontrando paz",points:{save_your_tears:3,blinding_lights:1}},{text:"Noches oscuras, secretos y vivir al límite",points:{the_hills:3,call_out_my_name:1}},{text:"En la cima del mundo, imparable",points:{starboy:3,blinding_lights:1}}]}];

</script>
